name: Vivienda CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Iniciar Spring-Boot
      run: mvn spring-boot:run &

    - name: Ejecutar Tests
      run: mvn verify
