<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMate - Calendario de Tareas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --purple-deep: #3d2b8e;
            --purple-mid: #6b3fa0;
            --purple-light: #9b59d0;
            --pink-hot: #e060a0;
            --pink-light: #f090c0;
            --bg-gradient-start: #2a1a6e;
            --bg-gradient-end: #7b2f9e;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-header h1 {
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 2.5em;
            font-weight: 800;
            margin: 0;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-button {
            background: linear-gradient(135deg, #9b59d0, #e060a0);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(224, 96, 160, 0.3);
        }

        .month-year {
            color: white;
            font-size: 1.3em;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }

        .calendar-grid {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            padding: 12px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .day:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .day.other-month {
            opacity: 0.3;
            background: rgba(255, 255, 255, 0.01);
        }

        .day.today {
            background: linear-gradient(135deg, rgba(155, 89, 208, 0.2), rgba(224, 96, 160, 0.1));
            border-color: rgba(155, 89, 208, 0.5);
            border-width: 2px;
        }

        .day-number {
            font-weight: 700;
            color: white;
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .day-tasks {
            flex: 1;
            overflow-y: auto;
            font-size: 0.75em;
        }

        .task-tag {
            background: linear-gradient(135deg, #9b59d0, #e060a0);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            font-weight: 500;
        }

        .task-tag.no-roommate {
            background: rgba(255, 165, 0, 0.6);
            border-left: 2px solid #ffa500;
        }

        .task-tag.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .calendar-legend {
            margin-top: 25px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.task { background: linear-gradient(135deg, #9b59d0, #e060a0); }
        .legend-color.no-roommate { background: rgba(255, 165, 0, 0.6); }
        .legend-color.today { background: transparent; border: 2px solid #9b59d0; }

        .modal-calendar {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-calendar.show { display: flex; }

        .modal-calendar-content {
            background: rgba(30, 30, 50, 0.95); backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 16px;
            padding: 30px; max-width: 500px; width: 90%; max-height: 70vh;
            overflow-y: auto; color: white;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px;
        }

        .close-modal { background: none; border: none; color: white; font-size: 1.5em; cursor: pointer; }

        .task-item {
            background: rgba(255, 255, 255, 0.05); border-left: 3px solid #9b59d0;
            padding: 12px; margin: 10px 0; border-radius: 8px;
        }

        .task-item.no-roommate { border-left-color: #ffa500; }
        .task-item.completed { opacity: 0.6; }

        .task-title { font-weight: 700; margin-bottom: 5px; }
        .task-description { font-size: 0.9em; color: rgba(255, 255, 255, 0.7); }

        .badge {
            background: rgba(255, 255, 255, 0.1); padding: 3px 8px;
            border-radius: 4px; display: inline-block; font-size: 0.8em; margin-top: 5px;
        }
        .badge.completada { color: #2ecc71; }
        .badge.pendiente { color: #ffa500; }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <h1><i class="fas fa-calendar-alt"></i> Calendario de Tareas</h1>
        </div>

        <div id="calendarSection">
            <div class="calendar-nav">
                <button class="nav-button" onclick="mesAnterior()">
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <span class="month-year" id="monthYear"></span>
                <button class="nav-button" onclick="mesSiguiente()">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <div class="calendar-grid">
                <div class="weekdays">
                    <div class="weekday">Dom</div>
                    <div class="weekday">Lun</div>
                    <div class="weekday">Mar</div>
                    <div class="weekday">Mié</div>
                    <div class="weekday">Jue</div>
                    <div class="weekday">Vie</div>
                    <div class="weekday">Sáb</div>
                </div>
                <div class="days" id="calendarDays"></div>
            </div>

            <div class="calendar-legend">
                <div class="legend-item">
                    <div class="legend-color task"></div>
                    <span>Tarea asignada</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color no-roommate"></div>
                    <span>Sin roommate</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color today"></div>
                    <span>Hoy</span>
                </div>
            </div>
        </div>
    </div>

    <div id="taskModal" class="modal-calendar">
        <div class="modal-calendar-content">
            <div class="modal-header">
                <h2 id="modalDate"></h2>
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
            </div>
            <div id="modalTasks"></div>
        </div>
    </div>

    <script th:inline="javascript">
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        
        const tareasPorFecha = {};

        /*[# th:if="${tareas != null}"]*/
            /*[# th:each="tarea : ${tareas}"]*/
                /*[# th:if="${tarea.fechaRealizacion != null}"]*/
                    // Formateamos la fecha de Java a String yyyy-MM-dd
                    var fString = /*[[${#temporals.format(tarea.fechaRealizacion, 'yyyy-MM-dd')}]]*/ '';
                    
                    if (!tareasPorFecha[fString]) {
                        tareasPorFecha[fString] = [];
                    }
                    
                    tareasPorFecha[fString].push({
                        id: /*[[${tarea.id}]]*/ 0,
                        nombre: /*[[${tarea.name}]]*/ '',
                        descripcion: /*[[${tarea.descripcion}]]*/ '',
                        completada: /*[[${tarea.completada}]]*/ false,
                        roommate: /*[[${tarea.asignadoA != null ? tarea.asignadoA.nombreReal : null}]]*/ null
                    });
                /*[/]*/
            /*[/]*/
        /*[/]*/

        function renderizarCalendario() {
            const primerDia = new Date(currentYear, currentMonth, 1);
            const ultimoDia = new Date(currentYear, currentMonth + 1, 0);
            const diaInicio = primerDia.getDay(); // 0 es Domingo
            const diasTotal = ultimoDia.getDate();

            const opciones = { year: 'numeric', month: 'long' };
            const mesAnio = primerDia.toLocaleDateString('es-ES', opciones);
            document.getElementById('monthYear').textContent = mesAnio.charAt(0).toUpperCase() + mesAnio.slice(1);

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            // Días mes anterior
            const ultimoDiaAnterior = new Date(currentYear, currentMonth, 0).getDate();
            for (let i = diaInicio - 1; i >= 0; i--) {
                const dia = ultimoDiaAnterior - i;
                calendarDays.appendChild(crearElementoDia(dia, true, null));
            }

            // Días mes actual
            const hoy = new Date();
            for (let dia = 1; dia <= diasTotal; dia++) {
                const fechaIterada = new Date(currentYear, currentMonth, dia);
                const esHoy = hoy.getDate() === dia && 
                             hoy.getMonth() === currentMonth && 
                             hoy.getFullYear() === currentYear;
                calendarDays.appendChild(crearElementoDia(dia, false, fechaIterada, esHoy));
            }

            // Rellenar hasta completar 42 celdas
            const celdasUsadas = diaInicio + diasTotal;
            for (let dia = 1; dia <= (42 - celdasUsadas); dia++) {
                calendarDays.appendChild(crearElementoDia(dia, true, null));
            }
        }

        function crearElementoDia(dia, esOtroMes, fecha, esHoy = false) {
            const dayElement = document.createElement('div');
            dayElement.className = 'day';
            if (esOtroMes) dayElement.classList.add('other-month');
            if (esHoy) dayElement.classList.add('today');

            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = dia;
            dayElement.appendChild(dayNumber);

            const dayTasks = document.createElement('div');
            dayTasks.className = 'day-tasks';

            if (!esOtroMes && fecha) {
                const y = fecha.getFullYear();
                const m = String(fecha.getMonth() + 1).padStart(2, '0');
                const d = String(fecha.getDate()).padStart(2, '0');
                const fStr = `${y}-${m}-${d}`;

                const tareas = tareasPorFecha[fStr] || [];

                tareas.forEach(tarea => {
                    const taskTag = document.createElement('div');
                    taskTag.className = 'task-tag';
                    if (!tarea.roommate) taskTag.classList.add('no-roommate');
                    if (tarea.completada) taskTag.classList.add('completed');
                    taskTag.textContent = tarea.nombre;
                    dayTasks.appendChild(taskTag);
                });

                if (tareas.length > 0) {
                    dayElement.onclick = () => mostrarDetallesTareas(fStr, tareas);
                }
            }

            dayElement.appendChild(dayTasks);
            return dayElement;
        }

        function mostrarDetallesTareas(fecha, tareas) {
            const modal = document.getElementById('taskModal');
            document.getElementById('modalDate').textContent = "Tareas del " + fecha;
            const modalTasks = document.getElementById('modalTasks');
            modalTasks.innerHTML = '';

            tareas.forEach(tarea => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task-item';
                if (!tarea.roommate) taskDiv.classList.add('no-roommate');
                if (tarea.completada) taskDiv.classList.add('completed');

                taskDiv.innerHTML = `
                    <p class="task-title">${tarea.nombre}</p>
                    <p class="task-description">${tarea.descripcion || 'Sin descripción'}</p>
                    <span class="badge">${tarea.roommate ? '👤 ' + tarea.roommate : '⚠️ Sin roommate'}</span>
                    <span class="badge ${tarea.completada ? 'completada' : 'pendiente'}">
                        ${tarea.completada ? 'Completada' : 'Pendiente'}
                    </span>
                `;
                modalTasks.appendChild(taskDiv);
            });
            modal.classList.add('show');
        }

        function cerrarModal() { document.getElementById('taskModal').classList.remove('show'); }
        function mesAnterior() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderizarCalendario(); }
        function mesSiguiente() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderizarCalendario(); }

        document.getElementById('taskModal').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });

        window.addEventListener('load', renderizarCalendario);
    </script>
</body>
</html>
