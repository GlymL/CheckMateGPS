<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMate - Calendario de Tareas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --purple-deep: #3d2b8e;
            --purple-mid: #6b3fa0;
            --purple-light: #9b59d0;
            --pink-hot: #e060a0;
            --pink-light: #f090c0;
            --bg-gradient-start: #2a1a6e;
            --bg-gradient-end: #7b2f9e;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        
        body::before {
            width: 500px;
            height: 500px;
            background: var(--pink-hot);
            top: -150px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }
        
        body::after {
            width: 400px;
            height: 400px;
            background: #4040cc;
            bottom: -120px;
            left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.08); }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-header h1 {
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 2.5em;
            font-weight: 800;
            margin: 0;
        }

        .vivienda-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .vivienda-selector select {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 250px;
        }

        .vivienda-selector select:hover,
        .vivienda-selector select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
        }

        .vivienda-selector select option {
            background: #3d2b8e;
            color: white;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: #ff6b6b;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-button {
            background: linear-gradient(135deg, #9b59d0, #e060a0);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(224, 96, 160, 0.3);
        }

        .month-year {
            color: white;
            font-size: 1.3em;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }

        .calendar-grid {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            padding: 12px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .day:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .day.other-month {
            opacity: 0.3;
            background: rgba(255, 255, 255, 0.01);
        }

        .day.today {
            background: linear-gradient(135deg, rgba(155, 89, 208, 0.2), rgba(224, 96, 160, 0.1));
            border-color: rgba(155, 89, 208, 0.5);
            border-width: 2px;
        }

        .day-number {
            font-weight: 700;
            color: white;
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .day.other-month .day-number {
            color: rgba(255, 255, 255, 0.3);
        }

        .day-tasks {
            flex: 1;
            overflow-y: auto;
            font-size: 0.75em;
        }

        .task-tag {
            background: linear-gradient(135deg, #9b59d0, #e060a0);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            font-weight: 500;
        }

        .task-tag.no-roommate {
            background: rgba(255, 165, 0, 0.6);
            border-left: 2px solid #ffa500;
        }

        .task-tag.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .empty-calendar {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-calendar i {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-calendar p {
            font-size: 1.1em;
            margin: 0;
        }

        .modal-calendar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-calendar.show {
            display: flex;
        }

        .modal-calendar-content {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            color: white;
            animation: slideIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            font-size: 1.5em;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .close-modal:hover {
            opacity: 1;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #9b59d0;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .task-item.no-roommate {
            border-left-color: #ffa500;
        }

        .task-item.completed {
            opacity: 0.6;
            border-left-style: dashed;
        }

        .task-title {
            font-weight: 700;
            margin: 0 0 5px 0;
            color: white;
        }

        .task-description {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin: 5px 0;
        }

        .task-meta-info {
            display: flex;
            gap: 10px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .badge.completada {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .badge.pendiente {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }

        .badge.no-roommate {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .calendar-legend {
            margin-top: 25px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.task {
            background: linear-gradient(135deg, #9b59d0, #e060a0);
        }

        .legend-color.no-roommate {
            background: rgba(255, 165, 0, 0.6);
        }

        .legend-color.today {
            background: transparent;
            border: 2px solid #9b59d0;
        }

        @media (max-width: 768px) {
            .calendar-header {
                flex-direction: column;
                align-items: stretch;
            }

            .calendar-header h1 {
                font-size: 2em;
            }

            .vivienda-selector {
                flex-direction: column;
            }

            .vivienda-selector select {
                min-width: auto;
                width: 100%;
            }

            .day {
                min-height: 80px;
                padding: 6px;
            }

            .weekdays {
                gap: 5px;
            }

            .days {
                gap: 5px;
            }

            .calendar-legend {
                gap: 15px;
            }

            .month-year {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div th:fragment="miCalendario" class="calendar-container">
        <div class="calendar-header">
            <h1><i class="fas fa-calendar-alt"></i> Calendario de Tareas</h1>
            <div class="vivienda-selector">
                <select id="viviendaSelect" onchange="cambiarVivienda()">
                    <option value="">-- Selecciona una vivienda --</option>
                    <option value="villa">Villa Marina</option>
                    <option value="departamento">Departamento Centro</option>
                    <option value="casa">Casa Principal</option>
                </select>
            </div>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="calendarSection" style="display: none;">
            <div class="calendar-nav">
                <button class="nav-button" onclick="mesAnterior()">
                    <i class="fas fa-chevron-left"></i> Anterior
                </button>
                <span class="month-year" id="monthYear"></span>
                <button class="nav-button" onclick="mesSiguiente()">
                    Siguiente <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <div class="calendar-grid">
                <div class="weekdays">
                    <div class="weekday">Dom</div>
                    <div class="weekday">Lun</div>
                    <div class="weekday">Mar</div>
                    <div class="weekday">Mié</div>
                    <div class="weekday">Jue</div>
                    <div class="weekday">Vie</div>
                    <div class="weekday">Sáb</div>
                </div>
                <div class="days" id="calendarDays"></div>
            </div>

            <div class="calendar-legend">
                <div class="legend-item">
                    <div class="legend-color task"></div>
                    <span>Tarea asignada</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color no-roommate"></div>
                    <span>Sin roommate asignado</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color today"></div>
                    <span>Hoy</span>
                </div>
            </div>
        </div>

        <div id="emptyState">
            <div class="empty-calendar">
                <i class="fas fa-inbox"></i>
                <p>Selecciona una vivienda para ver las tareas en el calendario</p>
            </div>
        </div>
    </div>

    <div id="taskModal" class="modal-calendar">
        <div class="modal-calendar-content">
            <div class="modal-header">
                <h2 id="modalDate"></h2>
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
            </div>
            <div id="modalTasks"></div>
        </div>
    </div>

    <script>
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedViviendaId = null;
        
        const tareasBase = {
            villa: {
                "2026-04-21": [
                    {id: 1, nombre: "Limpiar cocina", descripcion: "Limpiar superficies y electrodomésticos", completada: false, roommate: "Juan"},
                    {id: 2, nombre: "Comprar comida", descripcion: null, completada: false, roommate: null}
                ],
                "2026-04-22": [
                    {id: 3, nombre: "Pasar aspiradora", descripcion: "Toda la casa", completada: false, roommate: "María"}
                ],
                "2026-04-25": [
                    {id: 4, nombre: "Lavar platos", descripcion: null, completada: true, roommate: "Carlos"}
                ]
            },
            departamento: {
                "2026-04-23": [
                    {id: 5, nombre: "Limpiar baños", descripcion: "Baños principal y secundario", completada: false, roommate: "Ana"}
                ],
                "2026-04-24": [
                    {id: 6, nombre: "Sacar basura", descripcion: null, completada: false, roommate: null},
                    {id: 7, nombre: "Lavar ropa común", descripcion: null, completada: false, roommate: "Pedro"}
                ]
            },
            casa: {
                "2026-04-20": [
                    {id: 8, nombre: "Riego de plantas", descripcion: "Plantas de la sala y jardín", completada: false, roommate: "Laura"}
                ],
                "2026-04-21": [
                    {id: 9, nombre: "Limpiar entrada", descripcion: null, completada: false, roommate: null}
                ],
                "2026-04-26": [
                    {id: 10, nombre: "Cambiar sábanas", descripcion: "Todas las camas", completada: false, roommate: "Sofia"}
                ]
            }
        };

        function cambiarVivienda() {
            const select = document.getElementById('viviendaSelect');
            selectedViviendaId = select.value;

            if (!selectedViviendaId) {
                document.getElementById('calendarSection').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('calendarSection').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
            renderizarCalendario();
        }

        function renderizarCalendario() {
            const primerDia = new Date(currentYear, currentMonth, 1);
            const ultimoDia = new Date(currentYear, currentMonth + 1, 0);
            const diaInicio = primerDia.getDay();
            const diasTotal = ultimoDia.getDate();

            const opciones = { year: 'numeric', month: 'long' };
            const mesAnio = primerDia.toLocaleDateString('es-ES', opciones);
            document.getElementById('monthYear').textContent = mesAnio.charAt(0).toUpperCase() + mesAnio.slice(1);

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            const ultimoDiaAnterior = new Date(currentYear, currentMonth, 0).getDate();
            for (let i = diaInicio - 1; i >= 0; i--) {
                const dia = ultimoDiaAnterior - i;
                calendarDays.appendChild(crearElementoDia(dia, true, null));
            }

            const hoy = new Date();
            for (let dia = 1; dia <= diasTotal; dia++) {
                const esHoy = hoy.getDate() === dia && 
                             hoy.getMonth() === currentMonth && 
                             hoy.getFullYear() === currentYear;
                calendarDays.appendChild(crearElementoDia(dia, false, new Date(currentYear, currentMonth, dia), esHoy));
            }

            const diasRestantes = 42 - (diaInicio + diasTotal);
            for (let dia = 1; dia <= diasRestantes; dia++) {
                calendarDays.appendChild(crearElementoDia(dia, true, null));
            }
        }

        function crearElementoDia(dia, esOtroMes, fecha, esHoy = false) {
            const dayElement = document.createElement('div');
            dayElement.className = 'day';
            
            if (esOtroMes) {
                dayElement.classList.add('other-month');
            }
            if (esHoy) {
                dayElement.classList.add('today');
            }

            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = dia;
            dayElement.appendChild(dayNumber);

            const dayTasks = document.createElement('div');
            dayTasks.className = 'day-tasks';

            if (!esOtroMes && fecha && selectedViviendaId) {
                const fechaStr = fecha.toISOString().split('T')[0];
                const tareas = (tareasBase[selectedViviendaId] && tareasBase[selectedViviendaId][fechaStr]) || [];

                if (tareas.length > 0) {
                    tareas.forEach(tarea => {
                        const taskTag = document.createElement('div');
                        taskTag.className = 'task-tag';
                        if (!tarea.roommate) {
                            taskTag.classList.add('no-roommate');
                        }
                        if (tarea.completada) {
                            taskTag.classList.add('completed');
                        }
                        taskTag.textContent = tarea.nombre;
                        taskTag.style.cursor = 'pointer';
                        taskTag.onclick = (e) => {
                            e.stopPropagation();
                            mostrarDetallesTareas(fechaStr, tareas);
                        };
                        dayTasks.appendChild(taskTag);
                    });
                }

                dayElement.onclick = () => {
                    if (tareas.length > 0) {
                        mostrarDetallesTareas(fechaStr, tareas);
                    }
                };
            }

            dayElement.appendChild(dayTasks);
            return dayElement;
        }

        function mostrarDetallesTareas(fecha, tareas) {
            const modal = document.getElementById('taskModal');
            const fechaObj = new Date(fecha + 'T00:00:00');
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const fechaFormato = fechaObj.toLocaleDateString('es-ES', opciones);
            document.getElementById('modalDate').textContent = fechaFormato.charAt(0).toUpperCase() + fechaFormato.slice(1);

            const modalTasks = document.getElementById('modalTasks');
            modalTasks.innerHTML = '';

            tareas.forEach(tarea => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task-item';
                if (!tarea.roommate) {
                    taskDiv.classList.add('no-roommate');
                }
                if (tarea.completada) {
                    taskDiv.classList.add('completed');
                }

                let html = `
                    <p class="task-title">${tarea.nombre}</p>
                    <p class="task-description">${tarea.descripcion || 'Sin descripción'}</p>
                    <div class="task-meta-info">
                        ${tarea.roommate ? `<span class="badge">Asignado a: ${tarea.roommate}</span>` : 
                            '<span class="badge no-roommate"><i class="fas fa-exclamation"></i> Sin roommate asignado</span>'}
                        <span class="badge ${tarea.completada ? 'completada' : 'pendiente'}">
                            ${tarea.completada ? 'Completada' : 'Pendiente'}
                        </span>
                    </div>
                `;

                taskDiv.innerHTML = html;
                modalTasks.appendChild(taskDiv);
            });

            modal.classList.add('show');
        }

        function cerrarModal() {
            document.getElementById('taskModal').classList.remove('show');
        }

        function mesAnterior() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderizarCalendario();
        }

        function mesSiguiente() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderizarCalendario();
        }

        document.getElementById('taskModal').addEventListener('click', function(event) {
            if (event.target === this) {
                cerrarModal();
            }
        });

        window.addEventListener('load', function() {
            document.getElementById('emptyState').style.display = 'block';
        });
    </script>
</body>
</html>
