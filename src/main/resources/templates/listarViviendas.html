<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMate - Lista de Viviendas</title>
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .list-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto; 
        }
        .house-item {
            background: #f8f9fa;
            border-left: 5px solid #9b59d0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }
        .house-item h3 {
            margin: 0;
            color: #2d3748;
            font-size: 18px;
        }
    </style>
</head>
<body>

</div>

<div class="card" style="width: 500px;">
    <h1>Casas Registradas 🏘️</h1>
    <p class="subtitle">Lista de todas las viviendas en el sistema.</p>

    <div class="list-container">
        
        <div th:if="${listaCasas == null or #lists.isEmpty(listaCasas)}" style="color: #666; padding: 20px;">
            <p>Todavía no hay ninguna vivienda registrada.</p>
        </div>

        <div th:each="casa : ${listaCasas}" class="house-item">
            <span style="font-size: 24px; margin-right: 15px;">🏡</span>
            <div>
                <h3 th:text="${casa.name}">Nombre de la Casa</h3>
            </div>
        </div>

    </div>

    <a href="/" class="btn-back" style="margin-top: 20px;">← Volver al Inicio</a>
</div>

</body>
</html>
