<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Crear Tarea</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="modal-content" style="width: 400px; margin: 50px auto; padding: 25px;">
    
    <h2 style="text-align: center;">Nueva Tarea para <span th:text="${viviendaNombre}"></span> 🧹</h2>
    
    <div th:if="${error}" style="background-color: #ffcccc; color: #cc0000; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center;">
        <strong th:text="${error}"></strong>
    </div>

    <form th:action="@{/guardarTarea}" th:object="${tarea}" method="post">
        
        <input type="hidden" name="viviendaId" th:value="${viviendaId}">
        
        <label>Nombre de la tarea (Obligatorio)<br></label>
        <input type="text" th:field="*{name}" 
               required 
               pattern="^[a-zA-Z0-9 áéíóúÁÉÍÓÚñÑ]+$" 
               title="Formato incorrecto: Solo letras, números y espacios."  
               oninvalid="if(this.validity.valueMissing) { this.setCustomValidity('Por favor, rellena este campo obligatorio.'); } else if(this.validity.patternMismatch) { this.setCustomValidity('Formato incorrecto: Solo letras, números y espacios.'); }"
               oninput="this.setCustomValidity('')"
               style="width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px;">

        <label>Descripción (Opcional)<br></label>
        <textarea th:field="*{descripcion}" 
                  title="Letras, números y signos de puntuación"
                  oninput="if(this.value && !this.value.match(/^[a-zA-Z0-9 áéíóúÁÉÍÓÚñÑ.,!?;:\(\)]*$/)) { this.setCustomValidity('Formato incorrecto: No se permiten símbolos raros como * o $.'); } else { this.setCustomValidity(''); }"
                  style="width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; height: 80px; resize: none;"></textarea>

        <button type="submit" style="background-color: #9b59d0; color: white; width: 100%; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-bottom: 10px;">
            Crear Tarea
        </button>
        
        <button type="button" onclick="window.history.back()" style="background-color: #666; color: white; width: 100%; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s;">
            Cancelar
        </button>

    </form>
</div>

</body>
</html>
