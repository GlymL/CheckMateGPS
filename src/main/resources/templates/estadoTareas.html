<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Estado de Tareas</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Estilos específicos para la tabla */
        .table-container {
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.1);
        }

        /* Scrollbar personalizada para la tabla */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-track { background: transparent; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            font-size: 14px;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            position: sticky;
            top: 0;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }

        .estado-pendiente {
            color: var(--pink-hot, #e060a0);
            font-weight: bold;
        }

        .estado-terminada {
            color: #2ecc71; /* Verde para destacar que está hecha */
            font-weight: bold;
        }
        
        .roommate-name {
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

    <div class="modal-content" style="width: 600px; padding: 40px; text-align: center;">
    
        <h2 style="font-family: 'Nunito', sans-serif; margin-bottom: 25px;">Estado de Tareas 📊</h2>

        <div th:if="${#lists.isEmpty(tareas)}" style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.3); margin-bottom: 20px;">
            <p style="color: rgba(255,255,255,0.8); margin: 0;">No hay tareas en la vivienda seleccionada.</p>
        </div>

        <div th:if="${not #lists.isEmpty(tareas)}" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Roommate</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tarea : ${tareas}">
                        <td th:text="${tarea.getName()}">Limpiar cocina</td>
                        
                        <td>
                            <span th:if="${tarea.completada}" class="estado-terminada">Terminada</span>
                            <span th:unless="${tarea.completada}" class="estado-pendiente">Pendiente</span>
                        </td>
                        
                        <td class="roommate-name">
                            <span th:if="${tarea.asignadoA != null}" th:text="${tarea.asignadoA.nombreReal}">Juan</span>
                            <span th:if="${tarea.asignadoA == null}" style="color: rgba(255,255,255,0.4); font-style: italic;">Sin asignar</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button type="button" th:onclick="|window.location.href='/vivienda/' + '${viviendaId}'|" style="background: rgba(255,255,255,0.1); color: white; width: 100%; border: 1px solid rgba(255,255,255,0.3); padding: 14px; font-family: 'Nunito', sans-serif; font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.3s; margin-top: 10px;">
            Volver al Panel
        </button>

    </div>

</body>
</html>
