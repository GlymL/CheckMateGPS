<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CheckMate | Nueva Vivienda</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    body {
        margin: 0;
        background-color: #0f111a;
        font-family: 'Inter', sans-serif;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        background: #1a1d2d;
        border: 1px solid #2d3748;
        border-radius: 16px;
        padding: 40px;
        width: 350px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .logo-container {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo-container svg {
        width: 100px;
        height: 50px;
    }

    h2 {
        font-size: 22px;
        margin: 0 0 8px 0;
        text-align: center;
        color: #ffffff;
    }

    p.desc {
        font-size: 13px;
        color: #a0aec0;
        text-align: center;
        margin-bottom: 25px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 25px;
    }

    label {
        font-size: 12px;
        font-weight: 600;
        color: #cbd5e0;
    }

    input {
        background: #0f111a;
        border: 1px solid #4a5568;
        color: white;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #e060a0;
        box-shadow: 0 0 0 2px rgba(224, 96, 160, 0.2);
    }

    button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(90deg, #9b59d0 0%, #e060a0 100%);
        color: white;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<div class="container">
    <div class="logo-container">

    <h2>Crear Nueva Vivienda</h2>
    <p class="desc">Añade tu espacio para invitar a tus compañeros.</p>

    <form action="/registrar" method="post">
        <div class="form-group">
            <label>Identificador de la Vivienda</label>
            <input type="text" name="nombreVivienda" placeholder="Ej: Piso de estudiantes..." required />
        </div>
        <button type="submit">Siguiente Paso</button>
    </form>
</div>

</body>
</html>
