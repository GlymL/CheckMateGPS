<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Spring Boot Demo</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

h1{
    margin-bottom:20px;
    color:#333;
}

button{
    background:#2575fc;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
    transform:scale(1.05);
}

button:active{
    transform:scale(0.97);
}
</style>

</head>

<body>

<div class="card">
    <h1>Crea una casa!</h1>

    <form action="/submit" method="post">
        <button type="submit">Click Me 🥺</button>
    </form>
</div>

</body>
</html>
