<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Spring Boot Demo</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px; /* Un poco más de espacio si es necesario */
}

h1 {
    margin-bottom: 20px;
    color: #333;
    font-size: 24px;
}

/* --- Nuevo CSS para el campo de texto --- */
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box; /* Evita que el padding rompa el ancho */
    font-size: 14px;
    transition: 0.3s;
}

input[type="text"]:focus {
    outline: none;
    border-color: #2575fc;
    box-shadow: 0 0 8px rgba(37, 117, 252, 0.3);
}
/* --------------------------------------- */

button {
    background: #2575fc;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%; /* Hace que el botón ocupe todo el ancho */
}

button:hover {
    background: #1a5ed8;
    transform: scale(1.03); /* Suavizado un poco el scale para que no se salga de la tarjeta */
}

button:active {
    transform: scale(0.97);
}
</style>

</head>

<body>

<div class="card">
    <h1>¡Crea una casa!</h1>

    <form action="/crear-vivienda" method="post">
        
        <input type="text" name="direccion" placeholder="Ej: Calle Gran Vía 42" required>
        
        <button type="submit">Guardar Vivienda 🏠</button>
    </form>
</div>

</body>
</html>
