<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Spring Boot Demo</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

h1{
    margin-bottom:20px;
    color:#333;
}

textarea{
    width:100%;
    min-height:120px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:vertical;
    font-family:Arial, Helvetica, sans-serif;
}

button{
    background:#2575fc;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
    transform:scale(1.05);
}

button:active{
    transform:scale(0.97);
}

/* Modal background */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
}

/* Modal box */
.modal-content{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:left;
}

.modal-content input{
    width:100%;
    margin-bottom:15px;
    padding:8px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:20px;
}
</style>

<script>

function openMenu(){
    document.getElementById("houseMenu").style.display="flex";
}

function closeMenu(){
    document.getElementById("houseMenu").style.display="none";
}

</script>

</head>

<body>

<div class="card">
    <h1>Crea una casa!</h1>

    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <button onclick="openMenu()">Pulsa este botón para crear tu casa</button>
</div>




<!-- Popup Menu -->
<div class="modal" id="houseMenu">
    <div class="modal-content">

        <span class="close" onclick="closeMenu()">✖</span>

        <h2>Create House</h2>

        <form action="/submit" method="post" enctype="multipart/form-data">

            <label>House Name</label>
            <input type="text" name="houseName" required>

            <label>Description</label>
            <textarea name="description" required></textarea>

            <label>House Image</label>
            <input type="file" name="image" accept="image/*">



            <button type="submit">Create</button>

        </form>

    </div>
</div>

</body>
</html>
