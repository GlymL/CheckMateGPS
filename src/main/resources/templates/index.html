<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CheckMate - Crear Vivienda</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Fondo difuminado entre el morado y el rosa de CheckMate */
    background: linear-gradient(135deg, #5b4cbb 0%, #d25bc5 100%); 
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}

.card {
    /* Degradado brillante mezclando el rosa y morado de CheckMate, un poco transparente */
    background: linear-gradient(135deg, rgba(210, 91, 197, 0.85) 0%, rgba(91, 76, 187, 0.85) 100%);
    /* Efecto difuminado cristalino */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Borde sutil blanquecino para dar volumen */
    border: 1px solid rgba(255, 255, 255, 0.4);
    /* Resplandor exterior en tonos rosas y morados (el efecto brillante) */
    box-shadow: 0 0 40px rgba(210, 91, 197, 0.5), 0 15px 30px rgba(91, 76, 187, 0.6);
    
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
}

h1 {
    margin-bottom: 10px;
    font-size: 28px;
    color: #ffffff;
}

p.subtitle {
    color: #aaaaaa;
    margin-bottom: 30px;
    font-size: 15px;
}

button {
    background: #00d26a; /* Verde vibrante */
    color: #121212;
    border: none;
    padding: 15px 30px;
    border-radius: 30px; /* Botón en forma de píldora */
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    width: 100%;
}

button:hover {
    background: #00ff80;
    box-shadow: 0 0 15px rgba(0, 255, 128, 0.4); /* Efecto de brillo al pasar el ratón */
    transform: translateY(-2px);
}

button:active {
    transform: translateY(1px);
}
</style>

</head>

<body>

<div class="card">
    <h1>CREAR VIVIENDA</h1>
    <p class="subtitle">Empieza a organizar con CheckMate</p>
    
    <form action="/submit" method="post">
        <button type="submit">Crear Casa</button>
    </form>
</div>

</body>
</html>
