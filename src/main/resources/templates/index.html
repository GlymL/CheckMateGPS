<div class="card">
    <div class="card-icon">🏠</div>
    <h1>Crear Vivienda</h1>
    <p class="subtitle">Configura tu hogar y empieza a gestionar las tareas.</p>

    <form action="/submit" method="post" enctype="multipart/form-data">
        <div class="input-group">
            <label for="nombre">Nombre de la vivienda</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Piso de la carrera" required autocomplete="off" />
        </div>
        
        <div class="input-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" placeholder="Ej: Piso muy luminoso, 3 habitaciones..." required></textarea>
        </div>

        <div class="input-group">
            <label for="foto">Foto de portada</label>
            <input type="file" id="foto" name="foto" accept="image/*" required />
        </div>

        <button type="submit">Crear Vivienda →</button>
    </form>
</div>

<script src="/js/script.js"></script>
</body>
</html>
