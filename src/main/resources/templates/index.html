<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMate</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>


<div class="card">
    <h1>Crea una vivienda!</h1>

    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <button onclick="openMenu()">Pulsa este botón para crear tu vivienda</button>
    
    <a href="/listar" style="display: block; margin-top: 15px; padding: 16px 30px; text-decoration: none; text-align: center; border-radius: 14px; font-weight: 700; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">
        🏠 Ver viviendas registradas
    </a>
   
</div>




<div class="modal" id="houseMenu" style="display: none; background: rgba(0,0,0,0.1) !important;">
    <div class="modal-content" style="width: 400px; margin: 50px auto; padding: 25px;">
        
        <span class="close" onclick="closeMenu()">✖</span>

        <h2 style="text-align: center; margin-bottom: 20px;">Crear Vivienda</h2>

        <form action="/submit" method="post" enctype="multipart/form-data">

            <label>Nombre de la Vivienda (Obligatorio)<br></label>
            <input type="text" name="houseName" required
                   pattern="^[a-zA-Z0-9 áéíóúÁÉÍÓÚñÑ]+$" 
                   oninvalid="this.setCustomValidity('El formato del nombre es incorrecto.')" 
                   oninput="this.setCustomValidity('')"
                   style="width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 15px; background-color: white; border: 1px solid #ccc; border-radius: 6px; color: black;">

            <label>Descripción<br></label>
            <textarea name="description" required
                      oninput="validarDescripcion(this)"
                      oninvalid="if(this.value===''){this.setCustomValidity('Por favor, añade una descripción.')}"
                      style="width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 15px; background-color: white; border: 1px solid #ccc; border-radius: 6px; height: 80px; resize: none; color: black;"></textarea>

            <label>Foto de la Vivienda<br></label>
            <input type="file" name="image" accept=".png, .jpeg"
                   style="width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 20px; background-color: white; border: 1px solid #ccc; border-radius: 6px; color: black;">

            <button type="submit" style="background-color: #9b59d0; color: white; width: 100%; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; box-shadow: none;">
                Crear Vivienda
            </button>

            <button type="button" onclick="closeMenu()" style="background-color: #666; color: white; width: 100%; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; box-shadow: none;">
                Cancelar
            </button>

        </form>

    </div>
</div>

</body>
<script src="/js/index.js" th:src="@{/js/index.js}"></script>
</html>
