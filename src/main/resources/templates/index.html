<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CheckMate - Crear Vivienda</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #121212; /* Fondo oscuro moderno */
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}

.card {
    background: #1e1e1e;
    padding: 50px 40px;
    border-radius: 16px;
    border: 1px solid #333;
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    text-align: center;
    width: 320px;
}

h1 {
    margin-bottom: 10px;
    font-size: 28px;
    color: #ffffff;
}

p.subtitle {
    color: #aaaaaa;
    margin-bottom: 30px;
    font-size: 15px;
}

button {
    background: #00d26a; /* Verde vibrante */
    color: #121212;
    border: none;
    padding: 15px 30px;
    border-radius: 30px; /* Botón en forma de píldora */
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    width: 100%;
}

button:hover {
    background: #00ff80;
    box-shadow: 0 0 15px rgba(0, 255, 128, 0.4); /* Efecto de brillo al pasar el ratón */
    transform: translateY(-2px);
}

button:active {
    transform: translateY(1px);
}
</style>

</head>

<body>

<div class="card">
    <h1>🏠 Nueva Vivienda</h1>
    <p class="subtitle">Empieza a organizar con CheckMate</p>
    
    <form action="/submit" method="post">
        <button type="submit">Crear Casa</button>
    </form>
</div>

</body>
</html>
