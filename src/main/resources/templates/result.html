<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CheckMate - Bienvenido</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #121212;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}

.card {
    background: #1e1e1e;
    padding: 50px 40px;
    border-radius: 16px;
    border: 1px solid #333;
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    text-align: center;
    width: 320px;
}

/* Título de éxito */
h1 {
    margin-bottom: 25px;
    font-size: 28px;
    color: #00d26a; 
}

/* Estilo para la foto de Miguel */
.miguel-img {
    max-width: 150px; /* Tamaño máximo */
    height: auto;
    border-radius: 50%; /* Foto circular */
    border: 4px solid #333; /* Borde para que resalte */
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* El texto de bienvenida que me has pedido */
p.detailed-text {
    color: #ffffff;
    margin-bottom: 30px;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    line-height: 1.4;
}

/* Botón para volver al inicio */
.btn-back {
    display: inline-block;
    background: #333333;
    color: #ffffff;
    text-decoration: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s ease;
    text-transform: uppercase;
    width: 80%;
}

.btn-back:hover {
    background: #555555;
    transform: translateY(-2px);
}
</style>

</head>

<body>

<div class="card">
    <h1>¡Casa Creada! ✨</h1>
    
    <img src="/images/miguel.png" alt="Miguel te da la bienvenida" class="miguel-img">
    
    <p class="detailed-text">CASA CREADA CON ÉXITO:<br>MIGUEL TE DA LA BIENVENIDA</p>
    
    <a href="/" class="btn-back">Volver al Inicio</a>
</div>

</body>
</html>
