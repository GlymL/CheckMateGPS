<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CheckMate - Bienvenido</title>


<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Fondo difuminado entre el morado y el rosa de CheckMate */
    background: linear-gradient(135deg, #5b4cbb 0%, #d25bc5 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}


.card {
    /* Degradado brillante mezclando el rosa y morado de CheckMate, un poco transparente */
    background: linear-gradient(135deg, rgba(210, 91, 197, 0.85) 0%, rgba(91, 76, 187, 0.85) 100%);
    /* Efecto difuminado cristalino */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Borde sutil blanquecino para dar volumen */
    border: 1px solid rgba(255, 255, 255, 0.4);
    /* Resplandor exterior en tonos rosas y morados (el efecto brillante) */
    box-shadow: 0 0 40px rgba(210, 91, 197, 0.5), 0 15px 30px rgba(91, 76, 187, 0.6);
   
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
}


/* Título de éxito */
h1 {
    margin-bottom: 25px;
    font-size: 28px;
    color: #00d26a;
}


/* Estilo para la foto de Miguel con borde rosa fosforito */
.miguel-img {
    max-width: 140px;
    height: auto;
    border-radius: 50%;
    /* Borde rosa fosforito (magenta neón) */
    border: 4px solid #ff00ff;
    margin-bottom: 20px;
    /* Le añadimos un poco de brillo fosforito también a la sombra */
    box-shadow: 0 0 20px #ff00ff;
}


/* Botón para volver al inicio en verde */
.btn-back {
    display: inline-block;
    /* Verde brillante */
    background: #00d26a;
    color: #121212; /* Texto oscuro para que se lea perfecto */
    text-decoration: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s ease;
    text-transform: uppercase;
    width: 80%;
}


.btn-back:hover {
    background: #00ff80; /* Verde más clarito al pasar el ratón */
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 210, 106, 0.4);
}


/* El texto de bienvenida que me has pedido */
p.detailed-text {
    color: #ffffff;
    margin-bottom: 30px;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    line-height: 1.4;
}
</style>


</head>


<body>


<div class="card">
    <h1 th:text="'¡Casa ' + ${nombreDeLaCasa} + ' Creada! ✅'">¡Casa Creada! ✅</h1>
   
    <img src="/images/miguel.png" alt="Miguel te da la bienvenida" class="miguel-img">
   
    <p class="detailed-text">CASA CREADA CON ÉXITO:<br>MIGUEL TE DA LA BIENVENIDA</p>
   
    <a href="/" class="btn-back">Volver al Inicio</a>
</div>


</body>
</html>
