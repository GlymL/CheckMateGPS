<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Lista de Tareas</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .task-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            display: block;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .task-info b {
            font-size: 1.25em;
            color: #2c3e50;
            display: block;
            margin-bottom: 6px;
            padding-right: 90px;
        }

        .task-info p {
            margin: 0 0 12px 0;
            font-size: 0.95em;
            color: #7f8c8d;
            line-height: 1.5;
        }

        .task-meta {
            font-size: 0.85em;
            color: #444;
            background: #f4f6f8;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
            display: inline-block;
            margin-bottom: 5px;
        }

        .status-container {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }

        .badge-pendiente {
            background: #e67e22; 
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(230, 126, 34, 0.3);
        }

        .badge-completada {
            background: #2ecc71; 
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .date-assign-form {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-date {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            color: #333;
            flex-grow: 1;
        }

        .btn-date {
            width: auto; 
            white-space: nowrap;
            background: #9b59d0;
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-desc {
            display: inline-block; 
            background-color: #9b59d0; 
            color: white; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 0.85em; 
            font-weight: bold; 
            margin-top: 8px; 
            margin-bottom: 4px;
            transition: 0.3s;
        }
        .btn-desc:hover {
            background-color: #8449b8;
        }
    </style>
</head>
<body>

    <div class="modal-content" style="width: 500px; margin: 50px auto; padding: 25px; text-align: center;">
    
        <h2>Tareas de la Vivienda 📋</h2>
        <p style="color: rgba(255, 255, 255, 0.8); margin-bottom: 20px;">Todas las tareas creadas para esta casa.</p>

        <div th:if="${errorMsg}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9em;">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>
    <div class="scroll-container">
        <div th:each="tarea : ${vivienda.tareas}" class="task-box">
        
            <div class="task-info">
                <b th:text="${tarea.getName()}">Nombre de Tarea</b>
    
                <div>
                    <a th:href="@{'/tarea/' + ${tarea.id} + '/ver-descripcion'}" class="btn-desc">
                        👁️ Ver Descripción
                    </a>
                </div>

                <div class="task-meta">
                    <span th:if="${tarea.asignadoA != null}">
                        👤 Asignada a: <strong th:text="${tarea.asignadoA.nombreReal}"></strong>
                    </span>
                    <span th:if="${tarea.asignadoA == null}" style="color: #e74c3c;">
                        ⚠️ Sin asignar
                    </span>

                    <div th:if="${tarea.fechaRealizacion != null}" style="margin-top: 5px; color: #2980b9;">
                        📅 Fecha: <strong th:text="${#temporals.format(tarea.fechaRealizacion, 'dd/MM/yyyy')}"></strong>
                    </div>
                </div>

                <div th:if="${!tarea.completada}" class="management-container">
                    
                    <form th:action="@{/assignRoommate/submit}" method="post" class="assign-form">
                        <input type="hidden" name="taskId" th:value="${tarea.id}">
                        <input type="hidden" name="viviendaId" th:value="${viviendaId}">
                        
                        <select name="roommateId" required class="select-roommate">
                            <option value="" disabled selected>👤 Responsable...</option>
                            <option th:each="rm : ${roommates}" 
                                    th:value="${rm.id}" 
                                    th:text="${rm.nombreReal}"></option>
                        </select>
                        <button type="submit" class="btn-date" style="background: #3498db;">Asignar</button>
                    </form>

                    <form th:action="@{/assignDate/submit}" method="post" class="assign-form">
                        <input type="hidden" name="taskId" th:value="${tarea.id}">
                        <input type="hidden" name="viviendaId" th:value="${viviendaId}">
            
                        <input type="date" name="fecha" required class="input-date">
                        <button type="submit" class="btn-date">📅 Fecha</button>
                    </form>
                </div>
            </div>

            <div class="status-container">
            
                <span th:if="${!tarea.completada}" class="badge-pendiente">Pendiente</span>
            
                <div th:if="${tarea.completada}">
                    <span class="badge-completada">Completada</span>
                
                    <div th:if="${tarea.asignadoA != null}" style="font-size: 0.75em; color: #7f8c8d; margin-top: 5px;">
                        por <span th:text="${tarea.asignadoA.nombreReal}"></span>
                    </div>
                </div>
            
            </div>
        </div>
    </div>
        <div th:if="${#lists.isEmpty(vivienda.tareas)}" style="color: #888; padding: 20px;">
            Aún no hay tareas creadas en esta casa. ¡Añade la primera!
        </div>

        <button th:onclick="|window.location.href='/vivienda/' + '${viviendaId}'|" style="background-color: #666; color: white; width: 100%; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 15px;">
            Volver al Panel
        </button>
    </div>

</body>
</html>
