<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Lista de Tareas</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .task-box {
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }
        .task-info b {
            font-size: 1.1em;
            color: #333;
        }
        .task-info p {
            margin: 5px 0 0 0;
            font-size: 0.9em;
            color: #666;
        }
        .task-meta {
            margin-top: 10px;
            font-size: 0.85em;
            color: #555;
            background: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px dashed #ccc;
            display: inline-block;
        }
        .status-container {
            text-align: right;
            min-width: 100px;
        }
      
        .badge-pendiente {
            background: #e67e22; 
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
        }
        .badge-completada {
            background: #2ecc71; 
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
        }
        .scroll-container {
            max-height: 350px; 
            overflow-y: auto;  
            padding-right: 10px; 
            margin-bottom: 20px;
        }

       
        .scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        .date-assign-form {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-date {
            padding: 4px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .btn-date {
            background: #9b59d0;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
       
        .management-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .assign-form {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .select-roommate {
            padding: 4px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.85em;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="modal-content" style="width: 500px; margin: 50px auto; padding: 25px; text-align: center;">
    
        <h2>Tareas de la Vivienda 📋</h2>
        <p style="color: #666; margin-bottom: 20px;">Todas las tareas creadas para esta casa.</p>

        <div th:if="${errorMsg}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9em;">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>
    <div class="scroll-container">
        <div th:each="tarea : ${vivienda.tareas}" class="task-box">
        
            <div class="task-info">
                <b th:text="${tarea.getName()}">Nombre de Tarea</b>

                <p th:if="${tarea.descripcion != null and !tarea.descripcion.isEmpty()}" th:text="${tarea.descripcion}"></p>
                <p th:if="${tarea.descripcion == null or tarea.descripcion.isEmpty()}" style="font-style: italic; color: #aaa; font-size: 0.85em;">Sin descripción</p>

                <div class="task-meta">
                    <span th:if="${tarea.asignadoA != null}">
                        👤 Asignada a: <strong th:text="${tarea.asignadoA.nombreReal}"></strong>
                    </span>
                    <span th:if="${tarea.asignadoA == null}" style="color: #e74c3c;">
                        ⚠️ Sin asignar
                    </span>

                    <div th:if="${tarea.fechaRealizacion != null}" style="margin-top: 5px; color: #2980b9;">
                        📅 Fecha: <strong th:text="${#temporals.format(tarea.fechaRealizacion, 'dd/MM/yyyy')}"></strong>
                    </div>
                </div>

                <div th:if="${!tarea.completada}" class="management-container">
                    
                    <form th:action="@{/assignRoommate/submit}" method="post" class="assign-form">
                        <input type="hidden" name="taskId" th:value="${tarea.id}">
                        <input type="hidden" name="viviendaId" th:value="${viviendaId}">
                        
                        <select name="roommateId" required class="select-roommate">
                            <option value="" disabled selected>👤 Responsable...</option>
                            <option th:each="rm : ${roommates}" 
                                    th:value="${rm.id}" 
                                    th:text="${rm.nombreReal}"></option>
                        </select>
                        <button type="submit" class="btn-date" style="background: #3498db;">Asignar</button>
                    </form>

                    <form th:action="@{/assignDate/submit}" method="post" class="assign-form">
                        <input type="hidden" name="taskId" th:value="${tarea.id}">
                        <input type="hidden" name="viviendaId" th:value="${viviendaId}">
            
                        <input type="date" name="fecha" required class="input-date">
                        <button type="submit" class="btn-date">📅 Fecha</button>
                    </form>
                </div>
            </div>

            <div class="status-container">
            
                <span th:if="${!tarea.completada}" class="badge-pendiente">Pendiente</span>
            
                <div th:if="${tarea.completada}">
                    <span class="badge-completada">Completada</span>
                
                    <div th:if="${tarea.asignadoA != null}" style="font-size: 0.75em; color: #7f8c8d; margin-top: 5px;">
                        por <span th:text="${tarea.asignadoA.nombreReal}"></span>
                    </div>
                </div>
            
            </div>
        </div>
    </div>
        <div th:if="${#lists.isEmpty(vivienda.tareas)}" style="color: #888; padding: 20px;">
            Aún no hay tareas creadas en esta casa. ¡Añade la primera!
        </div>

        <button th:onclick="|window.location.href='/vivienda/' + '${viviendaId}'|" style="background-color: #666; color: white; width: 100%; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 15px;">
            Volver al Panel
        </button>
    </div>

</body>
</html>
