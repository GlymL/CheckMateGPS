<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Gestión de Tareas</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-purple: #9b59d0;
            --accent-pink: #e060a0;
            --success-green: #2ecc71;
            --warning-orange: #e67e22;
        }

        body {
            background: linear-gradient(135deg, #4b1a7a 0%, #25103f 100%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative; 
        }

        
        .app-logo-corner {
            position: absolute;
            top: 25px;
            left: 25px;
            height: 60px; 
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); 
            transition: 0.3s;
        }
        .app-logo-corner:hover {
            transform: scale(1.05);
        }

        .main-container {
            width: 90%;
            max-width: 950px; 
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            margin-top: 50px; 
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        h2 { font-weight: 900; font-size: 2.4rem; margin: 0; letter-spacing: -0.5px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px;}

        
        .tasks-grid {
            max-height: 550px;
            overflow-y: auto;
            padding-right: 15px;
            display: grid;
            gap: 20px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start; 
            gap: 20px;
            transition: 0.3s;
        }

        .task-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-2px); }

        .task-main-info { flex: 1; }

        .task-title-area {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 15px;
        }

        .task-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
        }

        .desc-link {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
            box-shadow: none;
            outline: none;
        }
        .desc-link:hover { background: rgba(255, 255, 255, 0.1); 
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: none;
        }

        .btn-close-modal {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: none; /* Sin brillos */
        }
        .btn-close-modal:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .task-details-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
        }

        .detail-item { display: flex; align-items: center; gap: 8px; }
        .detail-icon { opacity: 0.7; font-size: 1.1rem; }

        
        .badge {
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-pending { background: var(--warning-orange); box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3); }
        .badge-done { 
            background: var(--success-green) !important; 
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); 
        }

        
        .actions-column {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            gap: 15px;
            min-width: 260px; 
        }

        
        .task-actions-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .action-form-inline {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        
        .input-glass {
            flex-grow: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: white;
            padding: 8px;
            font-size: 0.85rem;
            font-family: 'Nunito', sans-serif;
        }
        .input-glass:focus { outline: none; border-color: var(--accent-purple); background: rgba(255,255,255,0.12); }
        
        
        select.input-glass {
            cursor: pointer;
            color: rgba(255,255,255,0.9);
        }
        select.input-glass option { background: #25103f; color: white; } 

        .btn-action-sm {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-action-sm:hover { background: var(--accent-pink); transform: translateY(-1px); }

        
        .btn-back-global {
            width: 100%;
            margin-top: 40px;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Nunito', sans-serif;
        }
        .btn-back-global:hover { background: rgba(255,255,255,0.15); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        
        .tasks-grid::-webkit-scrollbar { width: 8px; }
        .tasks-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .tasks-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .tasks-grid::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* --- ESTILOS DEL MODAL (Ventana Emergente) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            text-align: center;
            animation: modalAparece 0.3s ease-out;
        }
        @keyframes modalAparece {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

    </style>
</head>
<body>

<img src="/images/logo_checkmate.png" th:src="@{/images/image_4.png}" alt="CheckMate Logo" class="app-logo-corner">

<div class="main-container">
    <div class="header-section">
        <h2>Tareas de la Vivienda 📋</h2>
        <p class="subtitle" th:text="'Vivienda: ' + ${vivienda.name}">Panel de control</p>
    </div>

    <div th:if="${errorMsg}" style="background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: white; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.95rem; text-align: center; font-weight: 600;">
        ⚠️ <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${successMsg}" style="background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: white; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.95rem; text-align: center; font-weight: 600;">
        ✅ <span th:text="${successMsg}"></span>
    </div>

    <div class="tasks-grid">
        <div th:each="tarea : ${tareasOrdenadas}" class="task-card">
            
            
            <div class="task-main-info">
    <div class="task-title-area">
        <h3 class="task-title" th:text="${tarea.name}">Nombre de la Tarea</h3>
        
        <button th:if="${tarea.descripcion != null and !tarea.descripcion.isEmpty()}" 
            class="desc-link"
            th:data-title="${tarea.name}"
            th:data-desc="${tarea.descripcion}"
            onclick="abrirModal(this.getAttribute('data-title'), this.getAttribute('data-desc'))">
            Ver descripción
        </button>
    </div>

    <div class="task-details-row">
        <div class="detail-item">
            <span class="detail-icon">👤</span>
            <strong th:if="${tarea.asignadoA != null}" th:text="${tarea.asignadoA.nombreReal}"></strong>
            <span th:if="${tarea.asignadoA == null and !tarea.completada}" style="opacity: 0.4; font-style: italic;">Sin asignar</span>
        </div>

        <div th:if="${tarea.fechaRealizacion != null}" class="detail-item">
            <span class="detail-icon">📅</span>
            <span th:text="${#temporals.format(tarea.fechaRealizacion, 'dd/MM/yyyy')}"></span>
        </div>
    </div>
</div>

            <div class="actions-column">
    
    <form th:action="@{/tarea/cambiarEstado}" method="post">
        <input type="hidden" name="taskId" th:value="${tarea.id}">
        <input type="hidden" name="viviendaId" th:value="${vivienda.id}"> 
    
        <button type="submit" 
                th:class="${tarea.completada} ? 'badge badge-done' : 'badge badge-pending'" 
                style="cursor: pointer; border: none; outline: none; transition: all 0.2s; font-family: 'Nunito', sans-serif;">
            <span th:text="${tarea.completada} ? 'COMPLETADA' : 'PENDIENTE'"></span>
        </button>
    </form>

    <div th:if="${!tarea.completada}" class="task-actions-stack" style="margin-top: 10px;">
        <form th:action="@{/assignRoommate/submit}" method="post" class="action-form-inline">
            <input type="hidden" name="taskId" th:value="${tarea.id}">
            <input type="hidden" name="viviendaId" th:value="${viviendaId}">
            <select name="roommateId" required class="input-glass">
                <option value="" disabled selected>Responsable...</option>
                <option th:each="rm : ${roommates}" th:value="${rm.id}" th:text="${rm.nombreReal}"></option>
            </select>
            <button type="submit" class="btn-action-sm">Asignar</button>
        </form>

        <form th:action="@{/assignDate/submit}" method="post" class="action-form-inline">
            <input type="hidden" name="taskId" th:value="${tarea.id}">
            <input type="hidden" name="viviendaId" th:value="${viviendaId}">
            <input type="date" name="fecha" required class="input-glass">
            <button type="submit" class="btn-action-sm">📅 Fecha</button>
        </form>
    </div>
</div>
        </div>

        <div th:if="${#lists.isEmpty(vivienda.tareas)}" style="text-align: center; padding: 50px 20px; color: rgba(255,255,255,0.3); border: 2px dashed rgba(255,255,255,0.1); border-radius: 15px;">
            <p style="font-size: 1.1rem; margin: 0;">No hay tareas registradas en esta vivienda.</p>
            <p style="font-size: 0.85rem; margin-top: 5px;">¡Añade la primera desde el panel!</p>
        </div>
    </div>

    <button class="btn-back-global" th:onclick="|window.location.href='/vivienda/' + '${viviendaId}'|">
        Volver al Panel Principal
    </button>
</div>
<div id="modalDescripcion" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 id="modalTitulo" style="color: var(--accent-pink); font-size: 1.8rem; margin-top: 0;">Título</h2>
        
        <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
            <p id="modalTexto" style="margin: 0; color: rgba(255,255,255,0.9); line-height: 1.5; font-size: 1.05rem;"></p>
        </div>
        
        <button class="btn-close-global" onclick="cerrarModal()">
            Cerrar
        </button>
    </div>
</div>

<script>
    function abrirModal(titulo, descripcion) {
        document.getElementById('modalTitulo').innerText = titulo;
        document.getElementById('modalTexto').innerText = descripcion;
        document.getElementById('modalDescripcion').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modalDescripcion').style.display = 'none';
    }

    // Cerrar el modal si haces clic fuera de la caja
    window.onclick = function(event) {
        var modal = document.getElementById('modalDescripcion');
        if (event.target == modal) {
            cerrarModal();
        }
    }
</script>

</body>
</html>
