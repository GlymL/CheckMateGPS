<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Gestión de Vivienda</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .info-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .btn-action {
            display: inline-block;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 15px;
            width: 80%;
            box-sizing: border-box;
        }
        .btn-purple {
            background-color: #9b59d0;
        }
        .btn-purple:hover {
            background-color: #8449b8;
            transform: translateY(-2px);
        }
        .btn-blue {
            background-color: #3498db;
        }
        .btn-blue:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        .btn-green {
            background-color: #4CAF50; 
        }
        .btn-green:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
       .btn-back {
            display: inline-block;
            background-color: #da6ac7; 
            padding: 12px 20px; 
            border-radius: 6px; 
            text-decoration: none;
            font-weight: bold; 
            font-size: 14px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 80%; 
            box-sizing: border-box;
        }
        
        .btn-back:hover {
            background-color: #e983d8; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card" style="width: 500px; margin: 50px auto; text-align: center;">
    <h1>Vivienda <span th:text="${viviendaNombre}"></span></h1>
    
    <div class="info-box">
        <p>Panel de gestión de tu vivienda.</p>
    </div>

    <a th:href="@{/vivienda/{id}/nueva-tarea(id=${viviendaId})}" class="btn-action btn-purple">
        ➕ Añadir Nueva Tarea
    </a>

    <a th:href="@{/vivienda/{id}/listTareas(id=${viviendaId})}" class="btn-action btn-purple">
        📋 Ver Tareas de la Vivienda
    </a>
    <a th:href="@{/vivienda/{id}/nuevo-roommate(id=${viviendaId})}" class="btn-action btn-blue">
        👤 Añadir Roommate
    </a>
    <a th:href="@{/vivienda/{id}/roommates(id=${viviendaId})}" class="btn-action btn-blue">
    👥 Ver Roommates de la Vivienda
    </a>
    <a th:href="@{/asignarTarea}" class="btn-action btn-green">
        🤝 Asignar Tarea a Roommate
    </a>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <a th:href="@{/listar}" class="btn-back">
        Volver al listado de viviendas
    </a>

</div>

</body>
</html>
