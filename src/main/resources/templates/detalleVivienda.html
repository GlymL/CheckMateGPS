<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Gestión de Vivienda</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #2a1a6e 0%, #7b2f9e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: -1;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: #e060a0;
            top: -150px;
            right: -100px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: #4040cc;
            bottom: -120px;
            left: -80px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0;
        }

        .vivienda-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 20px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .vivienda-header h1 {
            margin: 0 0 10px 0;
            color: white;
            font-size: 2.5em;
            font-weight: 700;
        }

        .vivienda-desc {
            color: rgba(255, 255, 255, 0.65);
            font-size: 1.1em;
            margin: 10px 0 0 0;
        }

        .tabs-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .tabs-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            background: transparent;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 18px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            top: 2px;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .tab-btn.active {
            color: #e060a0;
            border-bottom-color: #e060a0;
        }

        .tab-content {
            padding: 25px;
            display: none;
            color: white;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .content-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #e060a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .content-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .content-item:last-child {
            margin-bottom: 0;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            color: white;
            margin-bottom: 4px;
        }

        .item-desc {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.9em;
        }

        .item-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background-color: rgba(255, 193, 7, 0.3);
            color: #ffd54f;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .status-completed {
            background-color: rgba(76, 175, 80, 0.3);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.65);
            padding: 40px 20px;
            font-style: italic;
        }

        .btn-add-new {
            display: inline-block;
            background: linear-gradient(135deg, #e060a0 0%, #9b59d0 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 8px 24px rgba(224, 96, 160, 0.4);
        }

        .btn-add-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(224, 96, 160, 0.6);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #9b59d0 0%, #6b3fa0 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(155, 89, 208, 0.4);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(155, 89, 208, 0.6);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="vivienda-header">
        <h1 th:text="${viviendaNombre}"></h1>
        <p th:if="${viviendaDescripcion != null and !viviendaDescripcion.isEmpty()}" 
           th:text="${viviendaDescripcion}"
           class="vivienda-desc">
        </p>
    </div>

    <div class="tabs-container">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="switchTab(event, 'roommates')">
                Roommates
            </button>
            <button class="tab-btn" onclick="switchTab(event, 'tareas')">
                Tareas
            </button>
            <button class="tab-btn" onclick="switchTab(event, 'vivienda')">
                Vivienda
            </button>
        </div>

        <div id="roommates" class="tab-content active">
            <div th:if="${roommates != null and roommates.size() > 0}">
                <ul class="content-list">
                    <li th:each="roommate : ${roommates}" class="content-item">
                        <div class="item-info">
                            <div class="item-name" th:text="${roommate.nombreReal}"></div>
                        </div>
                    </li>
                </ul>
                <a th:href="@{/vivienda/{id}/nuevo-roommate(id=${viviendaId})}" class="btn-add-new">
                    Añadir Roommate
                </a>
            </div>
            <div th:if="${roommates == null or roommates.size() == 0}">
                <div class="empty-state">
                    No hay roommates registrados
                </div>
                <div style="text-align: center; padding: 20px 0;">
                    <a th:href="@{/vivienda/{id}/nuevo-roommate(id=${viviendaId})}" class="btn-add-new">
                        Añadir Roommate
                    </a>
                </div>
            </div>
        </div>

        <div id="tareas" class="tab-content">
            <div th:if="${tareas != null and tareas.size() > 0}">
                <ul class="content-list">
                    <li th:each="tarea : ${tareas}" class="content-item">
                        <div class="item-info">
                            <div class="item-name" th:text="${tarea.nombre}"></div>
                            <div class="item-desc" th:text="${tarea.descripcion}"></div>
                        </div>
                        <span class="item-status" 
                              th:classappend="${tarea.completada} ? 'status-completed' : 'status-pending'"
                              th:text="${tarea.completada} ? 'Completada' : 'Pendiente'">
                        </span>
                    </li>
                </ul>
                <a th:href="@{/vivienda/{id}/nueva-tarea(id=${viviendaId})}" class="btn-add-new">
                    Añadir Tarea
                </a>
            </div>
            <div th:if="${tareas == null or tareas.size() == 0}">
                <div class="empty-state">
                    No hay tareas registradas
                </div>
                <div style="text-align: center; padding: 20px 0;">
                    <a th:href="@{/vivienda/{id}/nueva-tarea(id=${viviendaId})}" class="btn-add-new">
                        Añadir Tarea
                    </a>
                </div>
            </div>
        </div>

        <div id="vivienda" class="tab-content">
            <div style="padding: 20px; text-align: center;">
                <p style="color: rgba(255, 255, 255, 0.65); margin: 0;">
                    Información de la vivienda
                </p>
                <p style="color: white; font-size: 1.1em; margin: 10px 0 20px 0;">
                    <strong th:text="${viviendaNombre}"></strong>
                </p>
                <p th:if="${viviendaDescripcion != null and !viviendaDescripcion.isEmpty()}" 
                   th:text="${viviendaDescripcion}"
                   style="color: rgba(255, 255, 255, 0.65); margin: 10px 0;">
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        <a th:href="@{/}" class="btn-back">
            Volver al listado de viviendas
        </a>
    </div>
</div>

<script>
    function switchTab(evt, tabName) {
        var i, tabcontent, tabbuttons;
        
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }
        
        tabbuttons = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tabbuttons.length; i++) {
            tabbuttons[i].classList.remove("active");
        }
        
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
</script>

</body>
</html>
