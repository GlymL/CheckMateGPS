<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Gestión de Vivienda</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .info-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .btn-add-task {
            display: inline-block;
            background-color: #9b59d0;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add-task:hover {
            background-color: #8449b8;
            transform: translateY(-2px);
        }
        .btn-back {
            display: inline-block;
            background-color: #666;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-back:hover {
            background-color: #444;
        }
    </style>
</head>
<body>


<div class="card" style="width: 500px; margin: 50px auto; text-align: center;">
    <h1>Vivienda #<span th:text="${viviendaId}">7</span></h1>
    
    <div class="info-box">
        <p>Panel de gestión de tu vivienda.</p>
    </div>

    <a th:href="@{/vivienda/{id}/nueva-tarea(id=${viviendaId})}" class="btn-add-task">
        ➕ Añadir Nueva Tarea
    </a>

    <a th:href="@{/vivienda/{id}/listTareas(id=${viviendaId})}" 
       class="btn-add-task" style="background-color: #59d09b; margin-top: 10px;">
        📋 Ver Lista Tareas
    </a>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <a th:href="@{/listar}" class="btn-back">
        Volver al listado de casas
    </a>
</div>

</body>
</html>
