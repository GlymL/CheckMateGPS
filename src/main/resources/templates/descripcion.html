<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CheckMate - Descripción de Tarea</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        .modal-content {
            width: 420px;
            padding: 36px;
            border-radius: 24px;
            
            
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 20px 60px rgba(0, 0, 0, 0.35);
            color: white;
            position: relative;
            text-align: center;
            margin: 50px auto;
        }

        h2 {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: -0.3px;
            margin-bottom: 5px;
            color: white;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8); 
            text-transform: uppercase;
            letter-spacing: 1.2px; 
            margin-bottom: 24px;
        }

        .desc-box {
            background: rgba(0, 0, 0, 0.2); 
            border: 1px dashed rgba(255, 255, 255, 0.25); 
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 30px;
            text-align: left;
            min-height: 100px;
        }
        
        .desc-text {
            color: rgba(255, 255, 255, 0.95); 
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
        }
        
        .no-desc-text {
            color: rgba(255, 255, 255, 0.4); 
            font-style: italic;
            text-align: center;
            margin: 15px 0;
        }
        
        .btn-volver {
            width: 100%;
            background: linear-gradient(135deg, var(--pink-hot, #e060a0) 0%, var(--purple-light, #9b59d0) 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 6px 20px rgba(224, 96, 160, 0.3); 
        }

        .btn-volver:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(224, 96, 160, 0.4);
            filter: brightness(1.08);
        }

        .btn-volver:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="modal-content">
    
        <h2 th:text="${tarea.name}">Nombre de la Tarea</h2>
        <p class="subtitle">Descripción</p>

        <div class="desc-box">
            <p th:if="${tarea.descripcion != null and !tarea.descripcion.isEmpty()}" 
               class="desc-text" 
               th:text="${tarea.descripcion}"></p>

            <p th:if="${tarea.descripcion == null or tarea.descripcion.isEmpty()}" 
               class="no-desc-text">
               La tarea seleccionada no tiene descripción.
            </p>
        </div>

        <button type="button" class="btn-volver" th:onclick="|window.location.href='/vivienda/' + '${viviendaId}' + '/listTareas'|">
            Volver a la lista de tareas
        </button>
        
    </div>

</body>
</html>
